services:
  ydb:
    image: ydbplatform/local-ydb:latest
    # hostname must equal what the YDB discovery returns to clients;
    # combined with the fixed 2136:2136 mapping below this lets the test
    # reach the container as localhost:2136 from the host.
    hostname: localhost
    platform: linux/amd64
    environment:
      - YDB_USE_IN_MEMORY_PDISKS=true
      - YDB_DEFAULT_LOG_LEVEL=NOTICE
      - GRPC_TLS_PORT=2135
      - GRPC_PORT=2136
      - MON_PORT=8765
    ports:
      - "2135:2135"
      - "2136:2136"
      - "8765:8765"
    healthcheck:
      test: ["CMD-SHELL", "/local_ydb health --endpoint grpc://localhost:2136 --database /local || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 60
      start_period: 10s