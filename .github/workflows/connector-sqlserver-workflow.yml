name: SQL Server Builds
on:
  workflow_call:
    inputs:
      cache-key:
        description: "The cache key to use to restore/save build caches."
        required: true
        type: string
      # Currently not used as SQL Server does not perform matrix-style builds
      max-parallel:
        description: "The maximum number of workers to consume, by default uses all available."
        required: false
        type: number

jobs:
  build-sqlserver:
    name: SQL Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-java

      - uses: ./.github/actions/maven-cache
        with:
          key: ${{ inputs.cache-key }}-${{ hashFiles('**/pom.xml') }}

      - name: Build SQL Server
        shell: bash
        run: >
          ./mvnw clean install -B -pl debezium-connector-sqlserver -am
          -Passembly
          -Dcheckstyle.skip=true
          -Dformat.skip=true
          -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
          -Dmaven.wagon.http.pool=false
          -Dmaven.wagon.httpconnectionManager.ttlSeconds=120
          -Ddebezium.test.records.waittime=10
          -DfailFlakyTests=false
          -Ddebezium.test.mongo.replica.primary.startup.timeout.seconds=120

