name: Nightly Build Size Check

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

env:
  # Configuration is now centralized in .github/nightly-build-config.yml
  # These are fallback values if the config file is not found
  MAVEN_FULL_BUILD_PROJECTS: "\\!debezium-microbenchmark-oracle"
  SIZE_THRESHOLD_PERCENTAGE: 70
  SIZE_BASE_GB: 1

jobs:

  build_cassandra:
    name: Cassandra
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Action (Core)
        uses: actions/checkout@v6
        with:
          path: core
      - name: Checkout Action (Cassandra)
        uses: actions/checkout@v6
        with:
          repository: debezium/debezium-connector-cassandra
          path: cassandra
          ref: main
      - uses: ./core/.github/actions/setup-java
      - uses: ./core/.github/actions/maven-cache
        with:
          key: maven-debezium-test-build-${{ hashFiles('core/**/pom.xml') }}
      - uses: ./core/.github/actions/build-debezium-cassandra
        with:
          path-core: core
          path-cassandra: cassandra
          only-build: 'true'
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cassandra-build
          path: |
            cassandra/**/*.jar
            cassandra/**/*.tar.gz
            cassandra/**/*.zip
          retention-days: 1

  build_db2:
    name: Db2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Action (Core)
        uses: actions/checkout@v6
        with:
          path: core
      - name: Checkout Action (Db2)
        uses: actions/checkout@v6
        with:
          repository: debezium/debezium-connector-db2
          path: db2
          ref: main
      - uses: ./core/.github/actions/setup-java
      - uses: ./core/.github/actions/maven-cache
        with:
          key: maven-debezium-test-build-${{ hashFiles('core/**/pom.xml') }}
      - uses: ./core/.github/actions/build-debezium-db2
        with:
          path-core: core
          path-db2: db2
          only-build: 'true'
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: db2-build
          path: |
            db2/**/*.jar
            db2/**/*.tar.gz
            db2/**/*.zip
          retention-days: 1

  build_ibmi:
    name: IBMi
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Action (Core)
        uses: actions/checkout@v6
        with:
          path: core
      - name: Checkout Action (IBMi)
        uses: actions/checkout@v6
        with:
          repository: debezium/debezium-connector-ibmi
