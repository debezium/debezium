          path: ./debezium

      - name: Download SQL Server artifacts
        uses: actions/download-artifact@v4
        with:
          name: sqlserver-build
          path: ./debezium

      - name: Download MongoDB artifacts
        uses: actions/download-artifact@v4
        with:
          name: mongodb-build
          path: ./debezium

      - name: Download MariaDB artifacts
        uses: actions/download-artifact@v4
        with:
          name: mariadb-build
          path: ./debezium

      - name: Download JDBC artifacts
        uses: actions/download-artifact@v4
        with:
          name: jdbc-build
          path: ./debezium

      - name: Download Cassandra artifacts
        uses: actions/download-artifact@v4
        with:
          name: cassandra-build
          path: ./debezium-connector-cassandra

      - name: Download Db2 artifacts
        uses: actions/download-artifact@v4
        with:
          name: db2-build
          path: ./debezium-connector-db2

      - name: Download IBMi artifacts
        uses: actions/download-artifact@v4
        with:
          name: ibmi-build
          path: ./debezium-connector-ibmi

      - name: Download Ingres artifacts
        uses: actions/download-artifact@v4
        with:
          name: ingres-build
          path: ./debezium-connector-ingres

      - name: Download Server artifacts
        uses: actions/download-artifact@v4
        with:
          name: server-build
          path: ./debezium-server

      - name: Download Informix artifacts
        uses: actions/download-artifact@v4
        with:
          name: informix-build
          path: ./debezium-connector-informix

      - name: Download Vitess artifacts
        uses: actions/download-artifact@v4
        with:
          name: vitess-build
          path: ./debezium-connector-vitess

      - name: Download Spanner artifacts
        uses: actions/download-artifact@v4
        with:
          name: spanner-build
          path: ./debezium-connector-spanner

      - name: Download CockroachDB artifacts
        uses: actions/download-artifact@v4
        with:
          name: cockroachdb-build
          path: ./debezium-connector-cockroachdb

      - name: Checkout Action (for check-artifact-size action)
        uses: actions/checkout@v6
        with:
          path: core

      - name: Load Configuration
        id: config
        run: |
          CONFIG_FILE="core/.github/nightly-build-config.yml"

          # Function to read YAML values
          get_yaml_value() {
            local key=$1
            local default=$2
            if [ -f "$CONFIG_FILE" ]; then
              value=$(grep "^  ${key}:" "$CONFIG_FILE" | awk '{print $2}' | tr -d '"')
              if [ -n "$value" ]; then
                echo "$value"
                return
              fi
            fi
            echo "$default"
          }

          # Read configuration values
          SIZE_THRESHOLD_PCT=$(get_yaml_value "default-threshold-percentage" "${{ env.SIZE_THRESHOLD_PERCENTAGE }}")
          SIZE_BASE=$(get_yaml_value "base-size-gb" "${{ env.SIZE_BASE_GB }}")
          MAVEN_WARNING_THRESHOLD=$(get_yaml_value "maven-central-warning-threshold" "20")
          MAVEN_CENTRAL_BASE=$(get_yaml_value "maven-central-base" "https://repo1.maven.org/maven2/io/debezium")
          ZULIP_ENABLED=$(get_yaml_value "enabled" "true")
          ZULIP_STREAM=$(get_yaml_value "stream" "dev")
          ZULIP_TOPIC=$(get_yaml_value "topic" "alerts")

          # Set outputs
          echo "size_threshold_percentage=${SIZE_THRESHOLD_PCT}" >> $GITHUB_OUTPUT
          echo "size_base_gb=${SIZE_BASE}" >> $GITHUB_OUTPUT
          echo "maven_warning_threshold=${MAVEN_WARNING_THRESHOLD}" >> $GITHUB_OUTPUT
          echo "maven_central_base=${MAVEN_CENTRAL_BASE}" >> $GITHUB_OUTPUT
          echo "zulip_enabled=${ZULIP_ENABLED}" >> $GITHUB_OUTPUT
          echo "zulip_stream=${ZULIP_STREAM}" >> $GITHUB_OUTPUT
          echo "zulip_topic=${ZULIP_TOPIC}" >> $GITHUB_OUTPUT

          echo "Loaded configuration from ${CONFIG_FILE}"
          echo "  Size threshold: ${SIZE_THRESHOLD_PCT}% of ${SIZE_BASE}GiB"
          echo "  Maven warning threshold: ${MAVEN_WARNING_THRESHOLD}%"
          echo "  Zulip notifications: ${ZULIP_ENABLED} (${ZULIP_STREAM}/${ZULIP_TOPIC})"

      - name: Check Artifact Size
        id: check
        uses: ./core/.github/actions/check-artifact-size
        with:
          percentage: ${{ steps.config.outputs.size_threshold_percentage }}
          base-size-gb: ${{ steps.config.outputs.size_base_gb }}
          maven-central-warning-threshold: ${{ steps.config.outputs.maven_warning_threshold }}
          maven-central-base: ${{ steps.config.outputs.maven_central_base }}

      - name: Send Zulip notification
        if: |
          steps.config.outputs.zulip_enabled == 'true' &&
          (steps.check.outputs.exceeds_threshold == 'true' || steps.check.outputs.maven_central_warnings == 'true')
        uses: zulip/github-actions-zulip/send-message@v1
        with:
          api-key: ${{ secrets.ZULIP_TOKEN }}
          email: ${{ secrets.ZULIP_TOKEN_EMAIL_ADDRESS }}
          organization-url: "https://debezium.zulipchat.com"
          to: ${{ steps.config.outputs.zulip_stream }}
          type: "stream"
          topic: ${{ steps.config.outputs.zulip_topic }}
          content: |
            ⚠️ **Nightly Build Size Check - Alert**

            ${{ steps.check.outputs.exceeds_threshold == 'true' && '🚨 **Repository Size Threshold Exceeded**' || '' }}
            ${{ steps.check.outputs.exceeds_threshold == 'true' && format('Some repositories exceeded the size threshold of {0}% of {1}GiB.', steps.config.outputs.size_threshold_percentage, steps.config.outputs.size_base_gb) || '' }}

            ${{ steps.check.outputs.maven_central_warnings == 'true' && '📊 **Maven Central Size Warnings**' || '' }}
            ${{ steps.check.outputs.maven_central_warnings == 'true' && 'Some artifacts have significant size increases compared to Maven Central versions.' || '' }}

            **Build Date:** ${{ env.REPORT_TIMESTAMP }}
            **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            **📄 Download Report:** [size-report-${{ env.REPORT_TIMESTAMP }}.md](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)

            View the detailed size report artifact in the workflow run artifacts section.

      - name: Delete Build Artifacts
        if: always()
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            core-build
            storage-build
            openlineage-build
            ai-build
            schema-generator-build
            testing-build
            mysql-build
            postgres-build
            oracle-build
            sqlserver-build
            mongodb-build
            mariadb-build
            jdbc-build
            cassandra-build
            db2-build
            ibmi-build
            ingres-build
            informix-build
            vitess-build
            spanner-build
            cockroachdb-build
            server-build
          failOnError: false