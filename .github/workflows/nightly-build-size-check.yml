  check-size:
    name: "Check Artifact Size"
    needs: [build_cassandra, build_db2, build_ibmi, build_ingres, build_informix, build_vitess, build_spanner, build_cockroachdb, build_server, build_core, build_storage, build_openlineage, build_ai, build_schema_generator, build_testing, build_mysql, build_postgres, build_oracle, build_sqlserver, build_mongodb, build_mariadb, build_jdbc]
